packages:
  darwin:
    taps:
      - nats-io/nats-tools
    brews:
      - delta
      - fish
      - asdf
      - grc
      - starship
      - uv
      - jless
      - ffmpeg
      - asciinema
      - agg
      - pstree
      - nats-io/nats-tools/nats
      - btop
      - gnu-sed
      - ruff
      - gpg
      - tmux
      - tmux-mem-cpu-load
      - openssl@3
      - sshpass
      - uv
    casks:
      - 1password-cli
      - ghostty
      - nikitabobko/tap/aerospace
      - font-cascadia-code-nf
      - karabiner-elements
#      - caffeine # currently older version than manual install 1.1.3 vs 1.5

  linux:
    apt:
      - fish
      - grc
      - ffmpeg
      - asciinema
      - psmisc # pstree
      - btop
      - gpg
      - tmux
      - git-delta
      - cpupower-gui
      - gnome-shell-extension-manager
      - ghostty
      - starship

      # needed for asdf install python 
      - libreadline-dev
      - libssl-dev
      - libbz2-dev
      - zlib1g-dev
      - libz3-dev
      - libncurses-dev
      - liblzma-dev
      - uuid-dev
      - libffi-dev
      - libsqlite3-dev
      - tk-dev
    pacman:
      - fish
      - grc
      - ffmpeg
      - asciinema
      - psmisc # pstree
      - btop
      - gnupg
      - tmux
      - git-delta
      - cpupower-gui
      - code
      - ghostty
      - starship
      - docker
      - docker-compose
      - pycharm-community-edition
      - uv

      # needed for asdf install python 
      - tk
    snap:
    #  - chromium
    #  - code

  omf:
    all:
      - grc
    darwin:
      - osx
      - brew

  fisher:
    - lilyball/nix-env.fish
    - edc/bass
    - jhillyerd/plugin-git

  asdf:
    version: 0.19.0
    plugins:
      - python
      - nodejs
      - rust
      - golang
      - elixir
    tools:
      - name: python
        version: latest
      # - name: elixir
      #   version: 1.18.2-otp-27

  pip:
    all:
      - argcomplete
    linux:
      - gnome-extensions-cli

  gnome_extensions:
    - quake-terminal@diegodario88.github.io

